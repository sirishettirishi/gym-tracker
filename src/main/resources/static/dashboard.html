<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GymTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0b0c;
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 11, 12, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .navbar div a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 32px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar div a.active {
            color: #bff000;
        }

        .navbar div a:hover {
            color: #bff000;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff !important;
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .welcome {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .welcome h2 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .welcome h2 span {
            color: #bff000;
        }

        .welcome p {
            color: #94a3b8;
            margin-top: 12px;
            font-size: 18px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 8% 60px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            min-width: 200px;
            flex: 1;
        }

        .stat-box h3 {
            font-size: 40px;
            color: #bff000;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-box p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 0 8% 100px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px;
            width: 340px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(191, 240, 0, 0.3);
        }

        .card .icon {
            font-size: 48px;
            margin-bottom: 24px;
            color: #bff000;
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.5;
        }
        body {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="dashboard.html" style="text-decoration: none;">
            <h1> GymTracker</h1>
        </a>
        <div>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="workout.html">Workout</a>
            <a href="goals.html">Goal</a>
            <a href="#" class="logout-btn" onclick="logout()">Logout</a>
        </div>
    </div>

    <!-- Welcome -->
    <div class="welcome">
        <h2>Welcome back, <span id="usernameDisplay">User</span>!</h2>
        <p>Ready to crush your workout today?</p>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-box">
            <h3 id="totalWorkouts">0</h3>
            <p>Total Workouts</p>
        </div>
        <div class="stat-box">
            <h3 id="totalGoals">0</h3>
            <p>Total Goals</p>
        </div>
        <div class="stat-box">
            <h3 id="achievedGoals">0</h3>
            <p>Goals Achieved ✅</p>
        </div>
    </div>

    <!-- Cards -->
    <div class="cards">
        <a href="workout.html" class="card">
            <div class="icon">🏋️</div>
            <h3>Log Workout</h3>
            <p>Track your exercises, sets, reps and duration</p>
        </a>
        <a href="goals.html" class="card">
            <div class="icon">🎯</div>
            <h3>My Goals</h3>
            <p>Set new goals and track your progress</p>
        </a>
    </div>

    <script src="session.js"></script>
<script>
    // Auth Guard
    if (!SessionManager.isAuthenticated()) {
        window.location.href = "login.html";
    }

    const userId = SessionManager.get("userId");
    const username = SessionManager.get("username") || "Athlete";

    // Show username
    document.getElementById("usernameDisplay").textContent = username;

    function logout() {
        SessionManager.logout();
    }

    // Load stats
    window.onload = async function() {
        try {
            // Load workouts
            const workoutsRes = await fetch(
                `https://gym-tracker-tels.onrender.com/api/workouts/${userId}`
            );
            if (workoutsRes.ok) {
                const workouts = await workoutsRes.json();
                document.getElementById("totalWorkouts").textContent = workouts.length;
            }
        } catch (error) {
            console.error("Workouts error:", error);
        }

        try {
            // Load goals
            const goalsRes = await fetch(
                `https://gym-tracker-tels.onrender.com/api/goals/${userId}`
            );
            if (goalsRes.ok) {
                const goals = await goalsRes.json();
                const achieved = goals.filter(g => g.achieved).length;
                document.getElementById("totalGoals").textContent = goals.length;
                document.getElementById("achievedGoals").textContent = achieved;
            }
        } catch (error) {
            console.error("Goals error:", error);
        }
    }
</script>
</body>

</html>
