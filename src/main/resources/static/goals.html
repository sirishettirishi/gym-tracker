<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Goals - GymTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0b0c;
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 11, 12, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .navbar nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 32px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar nav a.active {
            color: #bff000;
        }

        .navbar nav a:hover {
            color: #bff000;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff !important;
            padding: 10px 24px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #bff000 !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 100px;
        }

        h2 {
            text-align: center;
            margin-bottom: 48px;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        h2 span {
            color: #bff000;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 48px;
            margin-bottom: 60px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #bff000;
            background: rgba(191, 240, 0, 0.05);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #bff000;
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(191, 240, 0, 0.2);
        }

        .goals-list {
            margin-top: 40px;
        }

        .goals-list h3 {
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        .goal-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .goal-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .goal-card.achieved {
            border-left: 4px solid #bff000;
        }

        .goal-card.not-achieved {
            border-left: 4px solid rgba(255, 255, 255, 0.1);
        }

        .goal-info h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .goal-info p {
            color: #64748b;
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-achieved {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-pending {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .achieve-btn {
            background: #bff000;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .achieve-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(191, 240, 0, 0.2);
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 48px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 24px;
            flex: 1;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 32px;
            color: #bff000;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-box p {
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="dashboard.html" style="text-decoration: none;">
            <h1>GymTracker</h1>
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="workout.html">Workout</a>
            <a href="goals.html" class="active">Goal</a>
            <a href="#" onclick="logout()" class="logout-btn">Logout</a>
        </nav>
    </div>

    <div class="container">
        <h2>My Fitness <span>Goals</span></h2>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-box">
                <h3 id="totalGoals">0</h3>
                <p>Total Goals</p>
            </div>
            <div class="stat-box">
                <h3 id="achievedGoals">0</h3>
                <p>Achieved ✅</p>
            </div>
            <div class="stat-box">
                <h3 id="pendingGoals">0</h3>
                <p>Pending 🎯</p>
            </div>
        </div>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg">
            ✅ Goal added successfully!
        </div>

        <!-- Form -->
        <div class="form-box">
            <div class="form-group">
                <label>Goal Description</label>
                <input type="text" id="goalDescription" placeholder="e.g. Bench Press 100kg">
            </div>
            <div class="form-group">
                <label>Target Date</label>
                <input type="date" id="targetDate">
            </div>
            <button class="btn" onclick="addGoal()">
                + Add Goal
            </button>
        </div>

        <!-- Goals List -->
        <div class="goals-list">
            <h3>🎯 Your Goals</h3>
            <div id="goalsList"></div>
        </div>
    </div>

    <script src="session.js"></script>
    <script>
        // Auth Guard
        if (!SessionManager.isAuthenticated()) {
            window.location.href = "login.html";
        }

        const userId = SessionManager.get("userId");

        function logout() {
            SessionManager.logout();
        }

        async function addGoal() {
            const goalDescription = document.getElementById("goalDescription").value;
            const targetDate = document.getElementById("targetDate").value;
            const successMsg = document.getElementById("successMsg");

            if (!goalDescription || !targetDate) return;

            try {
                const response = await fetch('https://gym-tracker-tels.onrender.com/api/goals/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, goalDescription, targetDate, achieved: false })
                });

                if (response.ok) {
                    successMsg.style.display = "block";
                    clearForm();
                    fetchGoals();
                    setTimeout(() => successMsg.style.display = "none", 3000);
                }
            } catch (error) {
                console.error("Error adding goal:", error);
            }
        }

        async function fetchGoals() {
            try {
                const response = await fetch(`https://gym-tracker-tels.onrender.com/api/goals/user/${userId}`);
                if (response.ok) {
                    const goals = await response.json();
                    const list = document.getElementById("goalsList");
                    
                    // Update stats
                    const achievedCount = goals.filter(g => g.achieved).length;
                    document.getElementById("totalGoals").textContent = goals.length;
                    document.getElementById("achievedGoals").textContent = achievedCount;
                    document.getElementById("pendingGoals").textContent = goals.length - achievedCount;

                    list.innerHTML = goals.map(g => `
                        <div class="goal-card ${g.achieved ? 'achieved' : 'not-achieved'}">
                            <div class="goal-info">
                                <h4>🎯 ${g.goalDescription}</h4>
                                <p>Target: ${new Date(g.targetDate).toLocaleDateString()}</p>
                            </div>
                            <div>
                                <span class="status-badge ${g.achieved ? 'status-achieved' : 'status-pending'}">
                                    ${g.achieved ? 'Achieved' : 'Pending'}
                                </span>
                                ${!g.achieved ? `<button class="achieve-btn" onclick="markAchieved(${g.id})">Complete</button>` : ''}
                            </div>
                        </div>
                    `).join("");
                }
            } catch (error) {
                console.error("Error fetching goals:", error);
            }
        }

        async function markAchieved(id) {
            try {
                const response = await fetch(`https://gym-tracker-tels.onrender.com/api/goals/achieved/${id}`, {
                    method: 'PUT'
                });
                if (response.ok) fetchGoals();
            } catch (error) {
                console.error("Error marking goal as achieved:", error);
            }
        }

        function clearForm() {
            document.getElementById("goalDescription").value = "";
            document.getElementById("targetDate").value = "";
        }

        // Initialize
        fetchGoals();
    </script>

</body>

</html>
