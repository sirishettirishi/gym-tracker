<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Goals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; }

        .navbar {
            background: #16213e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #e94560; font-size: 24px; }
        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }
        .navbar nav a:hover { color: #e94560; }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 { text-align: center; margin-bottom: 30px; font-size: 32px; }
        h2 span { color: #e94560; }

        .form-box {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.8; }

        .goals-list { margin-top: 40px; }
        .goals-list h3 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #e94560;
        }

        .goal-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .goal-card.achieved {
            border-left: 4px solid #2ecc71;
        }
        .goal-card.not-achieved {
            border-left: 4px solid #e94560;
        }

        .goal-info h4 { font-size: 18px; margin-bottom: 5px; }
        .goal-info p { color: #aaa; font-size: 14px; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-achieved {
            background: #2ecc71;
            color: white;
        }
        .status-pending {
            background: #e94560;
            color: white;
        }

        .achieve-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }
        .achieve-btn:hover { opacity: 0.8; }

        .success-msg {
            background: #2ecc71;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-box h3 { font-size: 36px; color: #e94560; }
        .stat-box p { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>💪 GymTracker</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="workout.html">Workouts</a>
            <a href="goals.html">Goals</a>
        </nav>
    </div>

    <div class="container">
        <h2>My Fitness <span>Goals</span></h2>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-box">
                <h3 id="totalGoals">0</h3>
                <p>Total Goals</p>
            </div>
            <div class="stat-box">
                <h3 id="achievedGoals">0</h3>
                <p>Achieved ✅</p>
            </div>
            <div class="stat-box">
                <h3 id="pendingGoals">0</h3>
                <p>Pending 🎯</p>
            </div>
        </div>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg">
            ✅ Goal added successfully!
        </div>

        <!-- Form -->
        <div class="form-box">
            <div class="form-group">
                <label>Goal Description</label>
                <input type="text" id="goalDescription"
                    placeholder="e.g. Bench Press 100kg">
            </div>
            <div class="form-group">
                <label>Target Date</label>
                <input type="date" id="targetDate">
            </div>
            <button class="btn" onclick="addGoal()">
                + Add Goal
            </button>
        </div>

        <!-- Goals List -->
        <div class="goals-list">
            <h3>🎯 Your Goals</h3>
            <div id="goalsList"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8081/api/goals";
        const USER_ID = 1;

        window.onload = loadGoals;

        function addGoal() {
            const goal = {
                goalDescription: document.getElementById("goalDescription").value,
                targetDate: document.getElementById("targetDate").value,
                userId: USER_ID
            };

            fetch(`${API}/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(goal)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("successMsg").style.display = "block";
                setTimeout(() => {
                    document.getElementById("successMsg").style.display = "none";
                }, 3000);
                loadGoals();
                clearForm();
            });
        }

        function loadGoals() {
            fetch(`${API}/${USER_ID}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("goalsList");
                list.innerHTML = "";

                // Update stats
                document.getElementById("totalGoals").textContent = data.length;
                document.getElementById("achievedGoals").textContent =
                    data.filter(g => g.achieved).length;
                document.getElementById("pendingGoals").textContent =
                    data.filter(g => !g.achieved).length;

                data.forEach(g => {
                    list.innerHTML += `
                        <div class="goal-card ${g.achieved ? 'achieved' : 'not-achieved'}">
                            <div class="goal-info">
                                <h4>🎯 ${g.goalDescription}</h4>
                                <p>Target Date: ${g.targetDate}</p>
                            </div>
                            <div>
                                <span class="status-badge ${g.achieved ? 'status-achieved' : 'status-pending'}">
                                    ${g.achieved ? '✅ Achieved' : '🔴 Pending'}
                                </span>
                                ${!g.achieved ? `
                                    <button class="achieve-btn"
                                        onclick="markAchieved(${g.id})">
                                        Mark Done
                                    </button>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
        }

        function markAchieved(id) {
            fetch(`${API}/${id}/achieve`, { method: "PUT" })
            .then(() => loadGoals());
        }

        function clearForm() {
            document.getElementById("goalDescription").value = "";
            document.getElementById("targetDate").value = "";
        }
    </script>

</body>
</html>
