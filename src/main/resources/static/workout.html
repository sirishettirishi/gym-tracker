<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Workout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; }

        .navbar {
            background: #16213e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #e94560; font-size: 24px; }
        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }
        .navbar nav a:hover { color: #e94560; }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 { text-align: center; margin-bottom: 30px; font-size: 32px; }
        h2 span { color: #e94560; }

        .form-box {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.8; }

        .workout-list { margin-top: 40px; }
        .workout-list h3 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #e94560;
        }

        .workout-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .workout-info h4 { font-size: 18px; margin-bottom: 5px; }
        .workout-info p { color: #aaa; font-size: 14px; }

        .delete-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .delete-btn:hover { opacity: 0.8; }

        .success-msg {
            background: #2ecc71;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>💪 GymTracker</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="workout.html">Workouts</a>
            <a href="goals.html">Goals</a>
        </nav>
    </div>

    <div class="container">
        <h2>Log Your <span>Workout</span></h2>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg">
            ✅ Workout logged successfully!
        </div>

        <!-- Form -->
        <div class="form-box">
            <div class="form-group">
                <label>Exercise Name</label>
                <input type="text" id="exerciseName" placeholder="e.g. Bench Press">
            </div>
            <div class="form-group">
                <label>Sets</label>
                <input type="number" id="sets" placeholder="e.g. 4">
            </div>
            <div class="form-group">
                <label>Reps</label>
                <input type="number" id="reps" placeholder="e.g. 12">
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" id="duration" placeholder="e.g. 45">
            </div>
            <button class="btn" onclick="addWorkout()">
                + Log Workout
            </button>
        </div>

        <!-- Workout List -->
        <div class="workout-list">
            <h3>📋 Your Workouts</h3>
            <div id="workoutList"></div>
        </div>
    </div>

    <script>
        const API = "https://gym-tracker-tels.onrender.com/api/workouts";
        const USER_ID = 1;

        // Load workouts on page open
        window.onload = loadWorkouts;

        function addWorkout() {
            const workout = {
                exerciseName: document.getElementById("exerciseName").value,
                sets: parseInt(document.getElementById("sets").value),
                reps: parseInt(document.getElementById("reps").value),
                duration: parseInt(document.getElementById("duration").value),
                userId: USER_ID
            };

            fetch(`${API}/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(workout)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("successMsg").style.display = "block";
                setTimeout(() => {
                    document.getElementById("successMsg").style.display = "none";
                }, 3000);
                loadWorkouts();
                clearForm();
            });
        }

        function loadWorkouts() {
            fetch(`${API}/${USER_ID}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("workoutList");
                list.innerHTML = "";
                data.forEach(w => {
                    list.innerHTML += `
                        <div class="workout-card">
                            <div class="workout-info">
                                <h4>🏋️ ${w.exerciseName}</h4>
                                <p>Sets: ${w.sets} | Reps: ${w.reps} | Duration: ${w.duration} mins | Date: ${w.date}</p>
                            </div>
                            <button class="delete-btn" onclick="deleteWorkout(${w.id})">Delete</button>
                        </div>
                    `;
                });
            });
        }

        function deleteWorkout(id) {
            fetch(`${API}/${id}`, { method: "DELETE" })
            .then(() => loadWorkouts());
        }

        function clearForm() {
            document.getElementById("exerciseName").value = "";
            document.getElementById("sets").value = "";
            document.getElementById("reps").value = "";
            document.getElementById("duration").value = "";
        }
    </script>

</body>
</html>
