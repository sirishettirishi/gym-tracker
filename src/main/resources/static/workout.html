<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Workout - GymTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0b0c;
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 11, 12, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .navbar nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 32px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar nav a.active {
            color: #bff000;
        }

        .navbar nav a:hover {
            color: #bff000;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff !important;
            padding: 10px 24px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #bff000 !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 100px;
        }

        h2 {
            text-align: center;
            margin-bottom: 48px;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        h2 span {
            color: #bff000;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 48px;
            margin-bottom: 60px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #bff000;
            background: rgba(191, 240, 0, 0.05);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #bff000;
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(191, 240, 0, 0.2);
        }

        .workout-list {
            margin-top: 40px;
        }

        .workout-list h3 {
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        .workout-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .workout-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .workout-info h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .workout-info p {
            color: #64748b;
            font-size: 14px;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: #ffffff;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="dashboard.html" style="text-decoration: none;">
            <h1>GymTracker</h1>
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="workout.html" class="active">Workout</a>
            <a href="goals.html">Goal</a>
            <a href="#" onclick="logout()" class="logout-btn">Logout</a>
        </nav>
    </div>

    <div class="container">
        <h2>Log Your <span>Workout</span></h2>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg">
            ✅ Workout logged successfully!
        </div>

        <!-- Form -->
        <div class="form-box">
            <div class="form-group">
                <label>Exercise Name</label>
                <input type="text" id="exerciseName" placeholder="e.g. Bench Press">
            </div>
            <div class="form-group">
                <label>Sets</label>
                <input type="number" id="sets" placeholder="e.g. 4">
            </div>
            <div class="form-group">
                <label>Reps</label>
                <input type="number" id="reps" placeholder="e.g. 12">
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" id="duration" placeholder="e.g. 45">
            </div>
            <button class="btn" onclick="addWorkout()">
                + Log Workout
            </button>
        </div>

        <!-- Workout List -->
        <div class="workout-list">
            <h3>📋 Your Workouts</h3>
            <div id="workoutList"></div>
        </div>
    </div>
    <script src="session.js"></script>
    <script>
        // Auth Guard
        if (!SessionManager.isAuthenticated()) {
            window.location.href = "login.html";
        }

        const userId = SessionManager.get("userId");

        function logout() {
            SessionManager.logout();
        }

        async function addWorkout() {
            const exerciseName = document.getElementById("exerciseName").value;
            const sets = document.getElementById("sets").value;
            const reps = document.getElementById("reps").value;
            const duration = document.getElementById("duration").value;
            const successMsg = document.getElementById("successMsg");

            if (!exerciseName || !sets || !reps) {
                alert("Please fill in at least Exercise Name, Sets, and Reps.");
                return;
            }

            try {
                const response = await fetch('https://gym-tracker-tels.onrender.com/api/workouts/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        muscleGroup: exerciseName,
                        exercises: `${sets} sets x ${reps} reps${duration ? ` (${duration} mins)` : ''}` 
                    })
                });

                if (response.ok) {
                    successMsg.style.display = "block";
                    clearForm();
                    fetchWorkouts();
                    setTimeout(() => successMsg.style.display = "none", 3000);
                }
            } catch (error) {
                console.error("Error logging workout:", error);
            }
        }

        async function fetchWorkouts() {
            try {
                const response = await fetch(`https://gym-tracker-tels.onrender.com/api/workouts/user/${userId}`);
                if (response.ok) {
                    const workouts = await response.json();
                    const list = document.getElementById("workoutList");
                    list.innerHTML = workouts.map(w => `
                        <div class="workout-card">
                            <div class="workout-info">
                                <h4>${w.muscleGroup || 'Workout'}</h4>
                                <p>${w.exercises || ''}</p>
                                <p style="font-size: 12px; opacity: 0.6;">${new Date(w.date).toLocaleDateString()}</p>
                            </div>
                            <button class="delete-btn" onclick="deleteWorkout(${w.id})">Delete</button>
                        </div>
                    `).join("");
                }
            } catch (error) {
                console.error("Error fetching workouts:", error);
            }
        }

        async function deleteWorkout(id) {
            if (!confirm("Are you sure?")) return;
            try {
                const response = await fetch(`https://gym-tracker-tels.onrender.com/api/workouts/delete/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) fetchWorkouts();
            } catch (error) {
                console.error("Error deleting workout:", error);
            }
        }

        function clearForm() {
            document.getElementById("exerciseName").value = "";
            document.getElementById("sets").value = "";
            document.getElementById("reps").value = "";
            document.getElementById("duration").value = "";
        }

        // Initialize
        fetchWorkouts();
    </script>
</body>

</html>
